<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ניהול | מירית ארומתרפיה</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #3B1F08;
      --gold: #D4A85A;
      --sand: #E8D9C0;
      --text: #F5EDE0;
      --text-mid: #D4C0A4;
      --text-dim: #A08868;
      --card: rgba(40,18,4,0.55);
      --border: rgba(232,217,192,0.15);
      --amber: #C8843C;
      --green: #5A9E6F;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Assistant', sans-serif;
      font-weight: 300;
      direction: rtl;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(ellipse 60% 55% at 72% 20%, #C87820 0%, transparent 60%),
        radial-gradient(ellipse 50% 45% at 20% 75%, #7A3C10 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 50% 50%, #A05818 0%, transparent 65%),
        #7A3E14;
      background-attachment: fixed;
    }

    /* ── PASSWORD SCREEN ── */
    #pw-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .pw-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 48px 40px;
      text-align: center;
      backdrop-filter: blur(8px);
      width: 340px;
    }
    .pw-box h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 300;
      color: var(--sand); margin-bottom: 8px;
    }
    .pw-box p { font-size: 0.86rem; color: var(--text-dim); margin-bottom: 24px; }
    .pw-box input {
      width: 100%;
      background: rgba(30,12,2,0.5);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Assistant', sans-serif;
      font-size: 0.92rem;
      text-align: center; letter-spacing: 0.2em;
      margin-bottom: 14px;
      direction: ltr;
    }
    .pw-box input:focus { outline: none; border-color: rgba(212,168,90,0.5); }
    .pw-btn {
      width: 100%;
      background: var(--gold); color: #3B1F08;
      border: none; padding: 12px;
      border-radius: 4px;
      font-family: 'Assistant', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .pw-btn:hover { background: var(--sand); }
    .pw-error { color: #E07070; font-size: 0.82rem; margin-top: 10px; display: none; }

    /* ── ADMIN APP ── */
    #admin-app { display: none; }

    nav {
      position: fixed; top:0; right:0; left:0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 40px;
      background: rgba(30,12,2,0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 300;
      color: var(--sand); text-decoration: none;
    }
    .nav-badge {
      font-size: 0.76rem; color: var(--amber);
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    .admin-wrap {
      max-width: 1080px; margin: 0 auto;
      padding: 100px 24px 60px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {}
    .sidebar-title {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.22em; color: var(--amber);
      text-transform: uppercase; margin-bottom: 14px;
    }

    .client-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .client-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .client-item:hover { border-color: rgba(212,168,90,0.4); }
    .client-item.active {
      border-color: var(--gold);
      background: rgba(212,168,90,0.1);
    }
    .client-item-name { font-size: 0.96rem; color: var(--text); margin-bottom: 2px; }
    .client-item-email { font-size: 0.76rem; color: var(--text-dim); }

    .btn-add {
      width: 100%;
      background: transparent;
      border: 1px dashed rgba(212,168,90,0.4);
      border-radius: 6px;
      padding: 12px;
      color: var(--gold);
      font-family: 'Assistant', sans-serif;
      font-size: 0.84rem;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.06em;
    }
    .btn-add:hover { background: rgba(212,168,90,0.08); }

    /* ── MAIN PANEL ── */
    .main-panel {}

    .panel-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 28px;
    }
    .panel-client-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 300; color: var(--text);
    }
    .panel-client-name em { font-style: italic; color: var(--gold); }

    .link-box {
      background: rgba(212,168,90,0.07);
      border: 1px solid rgba(212,168,90,0.25);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 0.76rem;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .link-box:hover { background: rgba(212,168,90,0.15); }

    .tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 10px 20px;
      font-size: 0.86rem; color: var(--text-dim);
      cursor: pointer; letter-spacing: 0.06em;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* oils tab */
    .oil-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 24px;
      margin-bottom: 14px;
    }
    .oil-row-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; color: var(--text);
      margin-bottom: 8px;
    }
    .oil-row-details { font-size: 0.84rem; color: var(--text-mid); line-height: 1.7; }

    /* progress tab */
    .prog-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .prog-feeling {
      font-size: 1.3rem; flex-shrink: 0;
      width: 36px; text-align: center;
    }
    .prog-text { font-size: 0.9rem; color: var(--text-mid); line-height: 1.7; }
    .prog-meta { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; }

    /* add oil form */
    .add-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px 28px;
      margin-top: 20px;
    }
    .add-form h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 400;
      color: var(--text); margin-bottom: 18px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.18em; color: var(--amber);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: rgba(30,12,2,0.5);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Assistant', sans-serif;
      font-size: 0.88rem; font-weight: 300;
      direction: rtl;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus { outline: none; border-color: rgba(212,168,90,0.5); }
    .form-group textarea { min-height: 72px; resize: vertical; }

    .btn-save {
      background: var(--gold); color: #3B1F08;
      border: none; padding: 11px 28px;
      border-radius: 4px;
      font-family: 'Assistant', sans-serif;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-save:hover { background: var(--sand); }

    /* add client modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,4,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #2A1505;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 36px 32px;
      width: 420px; max-width: 92vw;
    }
    .modal h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 300;
      color: var(--sand); margin-bottom: 20px;
    }
    .modal-btns { display: flex; gap: 10px; margin-top: 4px; }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 20px;
      color: var(--text-dim);
      font-family: 'Assistant', sans-serif;
      font-size: 0.86rem; cursor: pointer;
    }

    .empty-state {
      text-align: center; padding: 28px;
      color: var(--text-dim); font-size: 0.88rem;
      border: 1px dashed var(--border); border-radius: 6px;
    }

    .no-selection {
      text-align: center; padding: 80px 40px;
      color: var(--text-dim);
    }
    .no-selection p { font-size: 1rem; margin-bottom: 8px; }
    .no-selection small { font-size: 0.82rem; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width: 760px) {
      .admin-wrap { grid-template-columns: 1fr; }
      nav { padding: 16px 18px; }
    }
  </style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="pw-screen">
  <div class="pw-box">
    <h2>ניהול</h2>
    <p>כניסה לממשק הניהול של מירית</p>
    <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button class="pw-btn" onclick="checkPw()">כניסה</button>
    <div class="pw-error" id="pw-error">סיסמה שגויה</div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="admin-app">
  <nav>
    <a class="nav-logo" href="index.html">מירית | ארומתרפיה</a>
    <span class="nav-badge">ממשק ניהול</span>
  </nav>

  <div class="admin-wrap">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-title">לקוחות</div>
      <div class="client-list" id="client-list"></div>
      <button class="btn-add" onclick="openAddClient()">+ הוספת לקוחה חדשה</button>
    </div>

    <!-- MAIN PANEL -->
    <div class="main-panel" id="main-panel">
      <div class="no-selection">
        <p>בחרי לקוחה מהרשימה</p>
        <small>כדי לראות את הפרטים, השמנים והעדכונים שלה</small>
      </div>
    </div>

  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="add-client-modal">
  <div class="modal">
    <h3>לקוחה חדשה</h3>
    <div class="form-group">
      <label>שם</label>
      <input type="text" id="new-name" placeholder="שם הלקוחה"/>
    </div>
    <div class="form-group">
      <label>מייל</label>
      <input type="email" id="new-email" placeholder="email@example.com" dir="ltr"/>
    </div>
    <div class="form-group">
      <label>הערות (אופציונלי)</label>
      <textarea id="new-notes" placeholder="רקע, מטרות, הערות..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-save" onclick="saveNewClient()">יצירה</button>
      <button class="btn-cancel" onclick="closeAddClient()">ביטול</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ulkeegjpsvipbsltbelu.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_vvKFtWu8WB94csfEt5UhnA_mYKu0AeA';
  const ADMIN_PASSWORD = 'mirit2026';

  let currentClientId = null;
  let currentTab = 'oils';
  let allOils = [];

  function checkPw() {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PASSWORD) {
      document.getElementById('pw-screen').style.display = 'none';
      document.getElementById('admin-app').style.display = 'block';
      loadClients();
    } else {
      document.getElementById('pw-error').style.display = 'block';
    }
  }

  async function api(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...options.headers
      },
      ...options
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('he-IL', { day:'numeric', month:'long', year:'numeric' });
  }

  function feelingEmoji(n) {
    return ['😔','😐','🙂','😊','🌟'][n-1] || '•';
  }

  async function loadClients() {
    const clients = await api('clients?select=*&order=created_at.asc');
    const list = document.getElementById('client-list');
    list.innerHTML = clients.map(c => `
      <div class="client-item" onclick="selectClient('${c.id}','${c.name}','${c.token}')" id="ci-${c.id}">
        <div class="client-item-name">${c.name}</div>
        <div class="client-item-email">${c.email}</div>
      </div>
    `).join('');
  }

  async function selectClient(id, name, token) {
    currentClientId = id;
    document.querySelectorAll('.client-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`ci-${id}`)?.classList.add('active');

    const clientLink = `${location.origin}${location.pathname.replace('admin.html','client.html')}?t=${token}`;

    const panel = document.getElementById('main-panel');
    panel.innerHTML = `
      <div class="panel-header">
        <div>
          <div class="panel-client-name">${name}</div>
        </div>
        <div class="link-box" onclick="copyLink('${clientLink}')">
          📋 העתיקי קישור ללקוחה
        </div>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('oils')">שמנים</div>
        <div class="tab" onclick="switchTab('progress')">עדכוני התקדמות</div>
      </div>
      <div class="tab-panel active" id="tab-oils"></div>
      <div class="tab-panel" id="tab-progress"></div>
    `;

    await loadOils(id);
    await loadProgress(id);
  }

  async function loadOils(clientId) {
    allOils = await api(`oils?client_id=eq.${clientId}&select=*&order=created_at.asc`);
    const el = document.getElementById('tab-oils');
    const oilsHtml = allOils.length
      ? allOils.map(o => `
          <div class="oil-row">
            <div class="oil-row-name">${o.name}</div>
            <div class="oil-row-details">
              ${o.ingredients ? `<b>רכיבים:</b> ${o.ingredients}<br>` : ''}
              ${o.purpose ? `<b>מטרה:</b> ${o.purpose}<br>` : ''}
              ${o.instructions ? `<b>הוראות:</b> ${o.instructions}` : ''}
            </div>
          </div>
        `).join('')
      : '<div class="empty-state">עדיין לא נוסף שמן</div>';

    el.innerHTML = oilsHtml + `
      <div class="add-form">
        <h4>הוספת שמן חדש</h4>
        <div class="form-row">
          <div class="form-group">
            <label>שם התמהיל</label>
            <input type="text" id="oil-name" placeholder="למשל: תמהיל לילה"/>
          </div>
          <div class="form-group">
            <label>מטרה</label>
            <input type="text" id="oil-purpose" placeholder="הקלת כאבים, שינה..."/>
          </div>
        </div>
        <div class="form-group">
          <label>רכיבים</label>
          <input type="text" id="oil-ingredients" placeholder="לבנדר, פרנקינסנס, שמן שקדים..."/>
        </div>
        <div class="form-group">
          <label>הוראות שימוש</label>
          <textarea id="oil-instructions" placeholder="כיצד ומתי להשתמש..."></textarea>
        </div>
        <button class="btn-save" onclick="saveOil()">עדכון</button>
      </div>
    `;
  }

  async function loadProgress(clientId) {
    const items = await api(`progress_updates?client_id=eq.${clientId}&select=*,oils(name)&order=created_at.desc`);
    const el = document.getElementById('tab-progress');
    el.innerHTML = items.length
      ? items.map(p => `
          <div class="prog-row">
            <div class="prog-feeling">${p.feeling ? feelingEmoji(p.feeling) : '•'}</div>
            <div>
              <div class="prog-text">${p.update_text}</div>
              <div class="prog-meta">${p.oils ? p.oils.name + ' · ' : ''}${formatDate(p.created_at)}</div>
            </div>
          </div>
        `).join('')
      : '<div class="empty-state">אין עדכונים עדיין</div>';
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((el,i) => {
      el.classList.toggle('active', (i===0 && tab==='oils') || (i===1 && tab==='progress'));
    });
    document.getElementById('tab-oils').classList.toggle('active', tab==='oils');
    document.getElementById('tab-progress').classList.toggle('active', tab==='progress');
  }

  async function saveOil() {
    const name = document.getElementById('oil-name').value.trim();
    if (!name) { alert('חסר שם לשמן'); return; }
    await api('oils', {
      method: 'POST',
      body: JSON.stringify({
        client_id: currentClientId,
        name,
        purpose: document.getElementById('oil-purpose').value.trim(),
        ingredients: document.getElementById('oil-ingredients').value.trim(),
        instructions: document.getElementById('oil-instructions').value.trim()
      })
    });
    await loadOils(currentClientId);
  }

  async function saveNewClient() {
    const name = document.getElementById('new-name').value.trim();
    const email = document.getElementById('new-email').value.trim();
    if (!name || !email) { alert('שם ומייל הם שדות חובה'); return; }
    await api('clients', {
      method: 'POST',
      body: JSON.stringify({
        name,
        email,
        notes: document.getElementById('new-notes').value.trim()
      })
    });
    closeAddClient();
    await loadClients();
  }

  function copyLink(link) {
    navigator.clipboard.writeText(link).then(() => {
      alert('הקישור הועתק! שלחי אותו ללקוחה 🔗');
    });
  }

  function openAddClient() { document.getElementById('add-client-modal').classList.add('open'); }
  function closeAddClient() {
    document.getElementById('add-client-modal').classList.remove('open');
    document.getElementById('new-name').value = '';
    document.getElementById('new-email').value = '';
    document.getElementById('new-notes').value = '';
  }
</script>
</body>
</html>
